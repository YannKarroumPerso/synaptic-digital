<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ff5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ac89ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff60cd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ff5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ac89ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icône cerveau/réseau neuronal -->
  <g filter="url(#glow)">
    <!-- Cercle central -->
    <circle cx="28" cy="30" r="10" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>
    <!-- Nodes du réseau -->
    <circle cx="28" cy="30" r="2.5" fill="#8ff5ff"/>
    <circle cx="14" cy="20" r="2" fill="#ac89ff"/>
    <circle cx="42" cy="20" r="2" fill="#8ff5ff"/>
    <circle cx="14" cy="40" r="2" fill="#ff60cd"/>
    <circle cx="42" cy="40" r="2" fill="#ac89ff"/>
    <circle cx="28" cy="12" r="1.5" fill="#8ff5ff" opacity="0.8"/>
    <circle cx="28" cy="48" r="1.5" fill="#ac89ff" opacity="0.8"/>
    <!-- Connexions -->
    <line x1="28" y1="30" x2="14" y2="20" stroke="#8ff5ff" stroke-width="0.8" opacity="0.7"/>
    <line x1="28" y1="30" x2="42" y2="20" stroke="#ac89ff" stroke-width="0.8" opacity="0.7"/>
    <line x1="28" y1="30" x2="14" y2="40" stroke="#ff60cd" stroke-width="0.8" opacity="0.7"/>
    <line x1="28" y1="30" x2="42" y2="40" stroke="#ac89ff" stroke-width="0.8" opacity="0.7"/>
    <line x1="28" y1="30" x2="28" y2="12" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="28" y1="30" x2="28" y2="48" stroke="#ac89ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="14" y1="20" x2="42" y2="20" stroke="#8ff5ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="40" x2="42" y2="40" stroke="#ff60cd" stroke-width="0.5" opacity="0.3"/>
    <line x1="14" y1="20" x2="14" y2="40" stroke="#ac89ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="42" y1="20" x2="42" y2="40" stroke="#8ff5ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Texte SYNAPTIC -->
  <text x="58" y="26" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1" fill="url(#grad2)">SYNAPTIC</text>
  <!-- Texte DIGITAL -->
  <text x="58" y="42" font-family="Manrope, Arial, sans-serif" font-size="10" font-weight="400" letter-spacing="3" fill="#adaaad">DIGITAL</text>
</svg>
